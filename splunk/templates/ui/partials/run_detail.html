<div class="detail-header">
  <div class="detail-title-row">
    <span class="conf-badge {{ confidence }}">{{ confidence }}</span>
    <button class="right-panel-close"
            onclick="document.getElementById('right-panel').classList.remove('is-open');document.getElementById('right-panel').innerHTML='';"
            style="margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;">✕</button>
  </div>
  <div class="detail-meta" style="margin-top:6px;">
    <span>run: <code>{{ run_id[:8] }}</code></span>
    <span>source: {{ source }}</span>
    <span>{{ created_at }}</span>
  </div>
</div>

<hr class="divider">

<div class="report-body">
  {{ report_html | safe }}
</div>
