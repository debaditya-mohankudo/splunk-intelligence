<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Splunk Investigation</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    document.addEventListener("htmx:afterSettle", function(evt) {
      if (evt.target.id === 'right-panel') {
        evt.target.classList.toggle('is-open', evt.target.innerHTML.trim() !== '');
      }
    });

    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'copied';
        setTimeout(() => btn.textContent = 'copy', 1500);
      });
    }
  </script>
  <link rel="stylesheet" href="/ui/static/ui.css">
  <style>
    /* Splunk-specific extensions */
    .conf-high   { color: #4caf50; font-weight: 700; }
    .conf-medium { color: #fbbf24; font-weight: 700; }
    .conf-low    { color: #f87171; font-weight: 700; }
    .conf-badge  { font-size: 11px; border-radius: 4px; padding: 2px 8px; font-weight: 700; }
    .conf-badge.High   { background: #1a3a1a; color: #4caf50; }
    .conf-badge.Medium { background: #3a2e00; color: #fbbf24; }
    .conf-badge.Low    { background: #3a1a1a; color: #f87171; }
    .conf-badge.—      { background: #2a2a2a; color: #888; }

    .report-body h1 { font-size: 20px; margin: 20px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .report-body h2 { font-size: 16px; margin: 18px 0 6px; color: var(--accent); }
    .report-body h3 { font-size: 14px; margin: 12px 0 4px; }
    .report-body p  { margin: 6px 0; line-height: 1.6; }
    .report-body ul { margin: 6px 0 6px 20px; }
    .report-body li { margin: 3px 0; line-height: 1.5; }
    .report-body pre { background: #111; border: 1px solid var(--border); border-radius: 5px;
                       padding: 10px 14px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
    .report-body code { font-family: monospace; background: #2a2a2a; padding: 1px 4px; border-radius: 3px; }
    .report-body table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .report-body th, .report-body td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .report-body th { background: var(--surface); font-weight: 600; }

    .query-block { margin-bottom: 16px; }
    .query-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .area-badge { font-size: 10px; border-radius: 3px; padding: 2px 7px; font-weight: 700;
                  background: #1a2f4a; color: #60a5fa; }
    .iter-label { font-size: 11px; color: var(--muted); }
    .query-spl  { background: #111; border: 1px solid var(--border); border-radius: 5px;
                  padding: 10px 14px; font-family: monospace; font-size: 12px;
                  white-space: pre-wrap; word-break: break-all; position: relative; }
    .copy-btn   { font-size: 11px; background: #2a2a2a; color: var(--accent); border: 1px solid #444;
                  border-radius: 3px; padding: 2px 8px; cursor: pointer; flex-shrink: 0; }
    .copy-btn:hover { background: #333; }
    .rows-badge { font-size: 11px; color: var(--muted); margin-left: auto; }

    .run-row { padding: 8px 14px; cursor: pointer; display: flex; flex-direction: column;
               gap: 3px; border-bottom: 1px solid var(--border); }
    .run-row:hover { background: rgba(255,255,255,0.04); }
    .run-row.is-selected { background: rgba(91,156,246,0.1); border-left: 3px solid var(--accent); }
    .run-row-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-row-meta  { font-size: 11px; color: var(--muted); }

    .sse-iter { font-size: 12px; color: var(--muted); }
    .spinner   { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span class="logo">Splunk Investigation</span>
  </header>

  <div id="cockpit-wrap"
       hx-get="{{ urls.cockpit }}"
       hx-trigger="load, every 10s"
       hx-swap="innerHTML"></div>

  <div class="layout">
    <aside id="sidebar">
      {% block sidebar %}{% endblock %}
    </aside>
    <main id="detail-panel">
      {% block detail %}{% endblock %}
    </main>
    <aside id="right-panel"></aside>
  </div>
</body>
</html>
